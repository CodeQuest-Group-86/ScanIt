version: "3.9"

# ─── ScanIt Full Stack ────────────────────────────────────────────────────────
# Services:
#   postgres  — primary database (port 5432)
#   mailhog   — local SMTP + web UI for email preview (ports 1025 / 8025)
#   backend   — Spring Boot API (port 8080)
#
# Usage:
#   docker compose up -d            # start all services
#   docker compose logs -f backend  # tail backend logs
#   docker compose down -v          # stop + remove volumes

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scanit
      POSTGRES_USER: scanit
      POSTGRES_PASSWORD: scanit_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanit -d scanit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MailHog (local SMTP) ────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — open http://localhost:8025 to see emails
    logging:
      driver: none

  # ── Spring Boot Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/scanit
      DATABASE_USERNAME: scanit
      DATABASE_PASSWORD: scanit_dev_password
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      FRONTEND_URL: http://localhost:19006
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
