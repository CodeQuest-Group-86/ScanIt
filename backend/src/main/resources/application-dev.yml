spring:
  datasource:
    url: jdbc:h2:file:./data/scanitdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: localhost
    port: 1025   # MailHog — run: docker run -p 1025:1025 -p 8025:8025 mailhog/mailhog
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    com.scanit: DEBUG
    org.springframework.security: DEBUG

# ─── AI Vision ────────────────────────────────────────────────────────────────
# Get a free Gemini API key at: https://aistudio.google.com/app/apikey
# Free tier: 1,500 requests/day
gemini:
  api-key: ${GEMINI_API_KEY:}

openrouter:
  api-key: ${OPENROUTER_API_KEY:}
