spring:
  profiles:
    active: dev
  application:
    name: scanit-backend
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    # 256-bit base64 key — CHANGE THIS in production via JWT_SECRET env var
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    access-token-expiration: 3600000      # 1 hour  (ms)
    refresh-token-expiration: 604800000   # 7 days  (ms)
  mail:
    from: noreply@scanit.app
  frontend:
    url: http://localhost:19006

# ── Twilio Verify — SMS OTP (free trial) ──────────────────────────────────────
# Sign up at https://www.twilio.com/try-twilio
# Verify → create a service → copy Service SID
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  verify:
    service-sid: ${TWILIO_VERIFY_SERVICE_SID:}

# ── Resend — Email OTP (free tier: 3,000 emails/month) ────────────────────────
# Sign up at https://resend.com → API Keys → Create key
resend:
  api-key: ${RESEND_API_KEY:}
  from: ${RESEND_FROM:onboarding@resend.dev}
